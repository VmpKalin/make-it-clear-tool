<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TextPilot — Settings</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 20px; }
      h1 { margin-top: 0; font-size: 20px; }
      label { display: block; margin-bottom: 14px; font-size: 13px; }
      label span { display: block; margin-bottom: 4px; font-weight: 600; }
      input[type="text"], input[type="password"], select { width: 100%; box-sizing: border-box; padding: 8px; font-size: 13px; border-radius: 6px; border: 1px solid rgba(128,128,128,0.4); }
      .row { display: flex; gap: 10px; align-items: center; }
      button { padding: 8px 14px; font-size: 13px; border-radius: 6px; border: 1px solid rgba(128,128,128,0.4); cursor: pointer; }
      .status { margin-top: 10px; font-size: 12px; opacity: 0.75; min-height: 16px; }
      .note { font-size: 11px; opacity: 0.65; margin-top: -8px; margin-bottom: 14px; }
    </style>
  </head>
  <body>
    <h1>TextPilot Settings</h1>

    <label>
      <span>Provider</span>
      <select id="provider">
        <option value="claude">Claude (Anthropic)</option>
        <option value="openai">OpenAI (GPT)</option>
      </select>
    </label>

    <label>
      <span>API Key</span>
      <input id="apiKey" type="password" autocomplete="off" placeholder="sk-..." />
    </label>
    <p class="note">Stored locally in chrome.storage.local — never synced.</p>

    <label>
      <span>Default Action</span>
      <select id="defaultAction">
        <option value="grammar">Fix grammar</option>
        <option value="rewrite">Rewrite</option>
        <option value="shorten">Shorten</option>
        <option value="bullets">Bullets</option>
        <option value="translate">Translate</option>
      </select>
    </label>

    <label>
      <span>Show popup UI on hotkey</span>
      <div class="row">
        <input id="showUI" type="checkbox" />
        <span style="font-weight:400;">If off, result is copied silently to clipboard.</span>
      </div>
    </label>

    <label>
      <span>Trigger hotkey (Chrome-managed)</span>
      <input id="hotkeyTrigger" type="text" readonly />
    </label>
    <p class="note">Edit hotkeys at chrome://extensions/shortcuts.</p>

    <div class="row">
      <button id="save" type="button">Save</button>
      <span class="status" id="status"></span>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
